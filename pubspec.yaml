name: web_render
description: "Create, store, and run local HTML/CSS/JS apps on your device."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.12.0
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  provider: ^6.1.4
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: any
  flutter_driver:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/Logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  web:
    generate: true
    image_path: "assets/Logo.png"
    background_color: "#1A1A24"
    theme_color: "#1A1A24"
  image_path: "assets/Logo.png"
