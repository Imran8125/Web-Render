name: Build and Release Flutter App

on:
  push:
    tags:
      - 'v*' # Triggers workflow on version tags (e.g., v1.0.0, v2.1.3)
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build_release:
    name: Build and Release
    # Ubuntu runner is sufficient and faster for Android builds
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required for creating GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17' # Recommended version for newer Android builds

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # You can specify a flutter version or leave it to latest stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Android App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
